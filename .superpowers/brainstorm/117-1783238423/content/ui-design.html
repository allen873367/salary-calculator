<h2>前端 UI 設計</h2>
<p class="subtitle">深藍配色 · 乾淨專業 · 無 emoji</p>

<!-- Navigation -->
<div class="section">
  <h3>導航 Tab</h3>
  <div style="display:flex;gap:4px;border-bottom:1.5px solid var(--border);padding-bottom:0;">
    <div style="padding:10px 20px;font-size:0.85rem;font-weight:600;color:#2563eb;border-bottom:2px solid #2563eb;cursor:default;">新增記錄</div>
    <div style="padding:10px 20px;font-size:0.85rem;color:var(--muted);cursor:default;">記錄列表</div>
    <div style="padding:10px 20px;font-size:0.85rem;color:var(--muted);cursor:default;">統計報表</div>
  </div>
</div>

<!-- Form + Preview -->
<div class="section">
  <h3>表單區（左欄輸入 + 右欄預覽）</h3>
  <div style="display:flex;gap:20px;flex-wrap:wrap;">
    <!-- Form -->
    <div style="flex:1;min-width:280px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div style="grid-column:1/-1;">
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">店家名稱</div>
          <div style="display:flex;gap:6px;">
            <div style="flex:1;height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
            <div style="width:38px;height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--muted);">+</div>
          </div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">日期</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">上班時間</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">下班時間</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">總工時</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">時薪</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">薪資倍率</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;padding:0 10px;font-size:0.9rem;"><span style="font-weight:600;">1.0</span><span style="color:var(--muted);margin-left:6px;">x</span></div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:2px;">颱風天填 2.0</div>
        </div>
        <div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">加班時數</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
        <div style="grid-column:1/-1;">
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">備註</div>
          <div style="height:38px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <div style="height:38px;padding:0 20px;background:#2563eb;color:#fff;border-radius:8px;display:flex;align-items:center;font-size:0.88rem;font-weight:500;">儲存記錄</div>
        <div style="height:38px;padding:0 16px;background:transparent;border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;font-size:0.88rem;color:var(--muted);">清除</div>
      </div>
    </div>
    <!-- Preview -->
    <div style="width:220px;padding:16px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;">
      <div style="font-size:0.82rem;font-weight:600;color:var(--muted);margin-bottom:12px;">試算預覽</div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;">
        <span style="color:var(--muted);">本薪</span>
        <span style="font-weight:600;">$0</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;">
        <span style="color:var(--muted);">加班費</span>
        <span style="font-weight:600;">$0</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;">
        <span style="color:var(--muted);">倍率</span>
        <span style="font-weight:600;">1.0x</span>
      </div>
      <div style="border-top:1.5px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;">
        <span style="font-weight:600;">總計</span>
        <span style="font-weight:700;color:#2563eb;">$0</span>
      </div>
    </div>
  </div>
</div>

<!-- Records table -->
<div class="section">
  <h3>記錄列表</h3>
  <div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px;">
    <table style="width:100%;border-collapse:collapse;font-size:0.84rem;">
      <thead>
        <tr style="background:var(--bg);">
          <th style="padding:10px 14px;text-align:left;font-size:0.78rem;color:var(--muted);font-weight:600;white-space:nowrap;">日期</th>
          <th style="padding:10px 14px;text-align:left;font-size:0.78rem;color:var(--muted);font-weight:600;">店家</th>
          <th style="padding:10px 14px;text-align:left;font-size:0.78rem;color:var(--muted);font-weight:600;">時薪</th>
          <th style="padding:10px 14px;text-align:left;font-size:0.78rem;color:var(--muted);font-weight:600;">工時</th>
          <th style="padding:10px 14px;text-align:right;font-size:0.78rem;color:var(--muted);font-weight:600;">本薪</th>
          <th style="padding:10px 14px;text-align:right;font-size:0.78rem;color:var(--muted);font-weight:600;">合計</th>
          <th style="padding:10px 14px;text-align:center;font-size:0.78rem;color:var(--muted);font-weight:600;">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="padding:40px 14px;text-align:center;color:var(--muted);" colspan="7">還沒有打工記錄</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Report -->
<div class="section">
  <h3>統計報表</h3>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
    <div style="background:var(--bg);padding:16px;text-align:center;border-radius:10px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);">總收入</div>
      <div style="font-size:1.5rem;font-weight:700;color:#2563eb;margin-top:4px;">$0</div>
    </div>
    <div style="background:var(--bg);padding:16px;text-align:center;border-radius:10px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);">總筆數</div>
      <div style="font-size:1.5rem;font-weight:700;margin-top:4px;">0</div>
    </div>
    <div style="background:var(--bg);padding:16px;text-align:center;border-radius:10px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);">店家數</div>
      <div style="font-size:1.5rem;font-weight:700;margin-top:4px;">0</div>
    </div>
    <div style="background:var(--bg);padding:16px;text-align:center;border-radius:10px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);">總工時</div>
      <div style="font-size:1.5rem;font-weight:700;color:#d97706;margin-top:4px;">0h</div>
    </div>
  </div>
</div>
