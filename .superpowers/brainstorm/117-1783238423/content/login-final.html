<h2>登入頁 — 最終版</h2>
<p class="subtitle">方案 A 精修 · 「帳號」取代「電子郵件」</p>

<div class="section">
  <h3>登入頁面</h3>
  <div style="display:flex;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;min-height:400px;">
    <!-- Left - Brand -->
    <div style="flex:1;background:linear-gradient(160deg, #1e3a5f 0%, #2563eb 60%, #3b82f6 100%);padding:48px;display:flex;flex-direction:column;justify-content:center;color:#fff;min-width:220px;position:relative;overflow:hidden;">
      <!-- Decorative element -->
      <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>
      <div style="position:absolute;bottom:-60px;left:-30px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.03);"></div>

      <div style="font-family:Outfit,sans-serif;font-size:2rem;font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin-bottom:16px;">
        打工薪資<br>計算器
      </div>
      <div style="font-size:0.92rem;opacity:0.75;font-weight:400;line-height:1.6;max-width:220px;">
        記錄每一份辛苦<br>輕鬆掌握收入
      </div>

      <div style="margin-top:auto;display:flex;gap:6px;">
        <div style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
        <div style="width:20px;height:6px;border-radius:3px;background:rgba(255,255,255,0.6);"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
      </div>
    </div>
    <!-- Right - Form -->
    <div style="flex:1;padding:48px;display:flex;flex-direction:column;justify-content:center;background:var(--bg-card);min-width:260px;">
      <div style="font-family:Outfit,sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;">登入</div>
      <div style="font-size:0.88rem;color:var(--muted);margin-bottom:32px;">輸入帳號密碼繼續</div>

      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:20px;">
        <label style="font-size:0.82rem;color:var(--text-secondary);font-weight:500;">帳號</label>
        <input type="text" value="mike9" style="height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:0.92rem;font-family:Inter,sans-serif;background:var(--bg-input);color:var(--text-primary);outline:none;transition:border-color 0.2s;" readonly onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor=''">
      </div>

      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px;">
        <label style="font-size:0.82rem;color:var(--text-secondary);font-weight:500;">密碼</label>
        <input type="password" value="••••••••" style="height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:0.92rem;font-family:Inter,sans-serif;background:var(--bg-input);color:var(--text-primary);outline:none;transition:border-color 0.2s;" readonly onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor=''">
      </div>

      <div style="text-align:right;font-size:0.8rem;color:#2563eb;margin-bottom:28px;cursor:default;font-weight:500;">忘記密碼？</div>

      <button style="height:46px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-family:Inter,sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;transition:background 0.2s;margin-bottom:16px;" onmouseover="this.style.background='#1e40af'" onmouseout="this.style.background='#2563eb'">登入</button>

      <div style="text-align:center;font-size:0.88rem;color:var(--muted);">
        還沒有帳號？ <span style="color:#2563eb;font-weight:600;cursor:default;">註冊</span>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>註冊頁</h3>
  <div style="display:flex;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;min-height:400px;">
    <!-- Left - Brand -->
    <div style="flex:1;background:linear-gradient(160deg, #1e3a5f 0%, #2563eb 60%, #3b82f6 100%);padding:48px;display:flex;flex-direction:column;justify-content:center;color:#fff;min-width:220px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-30px;left:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>
      <div style="font-family:Outfit,sans-serif;font-size:1.6rem;font-weight:700;line-height:1.2;letter-spacing:-0.02em;margin-bottom:12px;">
        建立你的<br>薪資帳戶
      </div>
      <div style="font-size:0.88rem;opacity:0.75;max-width:200px;">
        隨時隨地記錄<br>每一筆打工收入
      </div>
    </div>
    <!-- Right - Form -->
    <div style="flex:1;padding:48px;display:flex;flex-direction:column;justify-content:center;background:var(--bg-card);min-width:260px;">
      <div style="font-family:Outfit,sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;">註冊</div>
      <div style="font-size:0.88rem;color:var(--muted);margin-bottom:32px;">建立新帳號開始使用</div>

      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:20px;">
        <label style="font-size:0.82rem;color:var(--text-secondary);font-weight:500;">帳號</label>
        <div style="height:44px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:20px;">
        <label style="font-size:0.82rem;color:var(--text-secondary);font-weight:500;">密碼</label>
        <div style="height:44px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:28px;">
        <label style="font-size:0.82rem;color:var(--text-secondary);font-weight:500;">確認密碼</label>
        <div style="height:44px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);"></div>
      </div>

      <button style="height:46px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;" onmouseover="this.style.background='#1e40af'" onmouseout="this.style.background='#2563eb'">註冊</button>
    </div>
  </div>
</div>
