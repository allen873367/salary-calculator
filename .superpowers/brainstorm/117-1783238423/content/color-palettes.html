<h2>選擇配色方案</h2>
<p class="subtitle">選一個你喜歡的色彩組合</p>

<div class="options">
  <!-- Option A: Cobalt -->
  <div class="option" data-choice="cobalt" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深藍 · 沉穩專業</h3>
      <p>值得信賴、金融級感受，適合計算工具</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#2563eb;border:2px solid var(--border);" title="#2563eb"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#1e40af;border:2px solid var(--border);" title="#1e40af"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#f8fafc;border:2px solid var(--border);" title="#f8fafc"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#0f172a;border:2px solid var(--border);" title="#0f172a"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#64748b;border:2px solid var(--border);" title="#64748b"></div>
      </div>
    </div>
  </div>

  <!-- Option B: Forest -->
  <div class="option" data-choice="forest" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>森林綠 · 自然 calm</h3>
      <p>柔和放鬆，長時間使用不刺眼</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#059669;border:2px solid var(--border);" title="#059669"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#047857;border:2px solid var(--border);" title="#047857"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#f7f7f5;border:2px solid var(--border);" title="#f7f7f5"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#1c1917;border:2px solid var(--border);" title="#1c1917"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#78716c;border:2px solid var(--border);" title="#78716c"></div>
      </div>
    </div>
  </div>

  <!-- Option C: Slate + Amber -->
  <div class="option" data-choice="slate-amber" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>石板灰 + 琥珀</h3>
      <p>冷靜基底 + 溫暖點綴，現代感強</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#475569;border:2px solid var(--border);" title="#475569"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#d97706;border:2px solid var(--border);" title="#d97706"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#f8fafc;border:2px solid var(--border);" title="#f8fafc"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#0f172a;border:2px solid var(--border);" title="#0f172a"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#94a3b8;border:2px solid var(--border);" title="#94a3b8"></div>
      </div>
    </div>
  </div>

  <!-- Option D: Violet + Teal -->
  <div class="option" data-choice="violet-teal" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>紫羅蘭 + 青綠</h3>
      <p>優雅中帶個性，不落俗套</p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="width:40px;height:40px;border-radius:8px;background:#7c3aed;border:2px solid var(--border);" title="#7c3aed"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#0d9488;border:2px solid var(--border);" title="#0d9488"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#faf5ff;border:2px solid var(--border);" title="#faf5ff"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#1c1917;border:2px solid var(--border);" title="#1c1917"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#a8a29e;border:2px solid var(--border);" title="#a8a29e"></div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top:24px;font-size:0.85rem;color:var(--muted);">點選一個選項後，在終端機告訴我你的選擇</p>
